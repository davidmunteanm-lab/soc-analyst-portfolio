name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-phishing-analyzer:
    name: Test phishing-analyzer
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tools/phishing-analyzer

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: tools/phishing-analyzer/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pytest with coverage
        run: pytest -v --cov=. --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: tools/phishing-analyzer/coverage.xml
          if-no-files-found: ignore